<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>University Leadership Dashboard</title>
    <link rel="stylesheet" href="/styles.css?v=20260420-6" />
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Strategic intelligence for university leadership</p>
          <div class="page-title-row">
            <h1 id="page-title">University Leadership Dashboard</h1>
            <span class="status-badge" id="page-context">Loading</span>
          </div>
          <p class="hero-copy" id="page-description">Loading page definition...</p>
          <nav class="top-nav" id="top-nav" aria-label="Dashboard pages"></nav>
        </div>
        <div class="control-card">
          <div class="field-label" id="countries-control">
            Focus countries
            <div class="dropdown" id="country-dropdown">
              <button type="button" class="dropdown-toggle" id="country-toggle">
                Select countries <span class="dropdown-count" id="country-count">0</span>
              </button>
              <div class="dropdown-menu" id="country-menu"></div>
            </div>
          </div>
          <label class="field-label" id="year-range-control">
            Time range
            <select id="year-range">
              <option value="2015:2024">2015 &ndash; 2024</option>
              <option value="2010:2024">2010 &ndash; 2024</option>
              <option value="2005:2024">2005 &ndash; 2024</option>
            </select>
          </label>
          <label class="field-label" id="institution-control" hidden>
            Universities
            <div class="dropdown" id="institution-dropdown">
              <button type="button" class="dropdown-toggle" id="institution-toggle">
                <span id="institution-selection-label">Select universities</span>
                <span class="dropdown-count" id="institution-count">0</span>
              </button>
              <div class="dropdown-menu" id="institution-menu"></div>
            </div>
            <span class="field-help" id="institution-help">Choose one or more universities. KPI cards stay on the first selected university.</span>
          </label>
          <button id="export-button" type="button">Export CSV</button>
        </div>
      </header>

      <section class="kpi-grid" id="kpi-grid" aria-live="polite"></section>

      <main class="dashboard-grid" id="page-content"></main>
    </div>
    <script type="module" src="/app.js?v=20260420-6"></script>
  </body>
</html>
